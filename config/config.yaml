# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                       Version: 2.2.0
# ═══════════════════════════════════════════════════════════════

# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/

# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"          # 北京时间 UTC+8
  show_version_update: true          # 显示版本更新提示

# ===============================================================
# 1.5 调度系统 —— 什么时间做什么事
# ===============================================================
schedule:
  enabled: true                      # 是否启用调度系统
  preset: "morning_evening"          # 全天推送 + 晚间当日汇总（推荐）

# ===============================================================
# 2. 数据源 - 热榜平台（🛠️ 已完美修复所有缩进与语法格式）
# ===============================================================
platforms:
  enabled: true                      # 是否启用热榜平台抓取
  sources:
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "ifeng"
      name: "凤凰网"
    - id: "tieba"
      name: "贴吧"
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"
    - id: "zhihu"
      name: "知乎"
    - id: "cankaoxiaoxi"
      name: "参考消息"
    - id: "gelonghui"
      name: "格隆汇"
    - id: "ithome"
      name: "IT之家"
    - id: "juejin"
      name: "掘金"
    - id: "sspai"
      name: "少数派"
    - id: "cls-depth"
      name: "财联社 深度"

# ===============================================================
# 3. 数据源 - RSS 订阅
# ===============================================================
rss:
  enabled: true                      # 是否启用 RSS 抓取

  freshness_filter:
    enabled: true                    # 是否启用新鲜度过滤
    max_age_days: 1                  # 最大文章年龄（天）

  feeds:
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"

    - id: "ruanyifeng"
      name: "阮一峰的网络日志"
      url: "http://www.ruanyifeng.com/blog/atom.xml"
      enabled: false                 # 禁用
     
    - id: "yahoo-finance"
      name: "雅虎财经"
      url: "https://finance.yahoo.com/news/rssindex"

# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "current"                    # daily | current | incremental
  display_mode: "keyword"            # 分组维度: keyword | platform
  sort_by_position_first: true       # 💡 建议改为 true：严格按照你 frequency_words.txt 的上下游定义顺序从上往下排，看起来更清晰
  rank_threshold: 5                  # 排名高亮阈值
  max_news_per_keyword: 0            # 每个关键词/标签最大显示数量（0=不限制）

# ===============================================================
# 4.5 筛选策略
# ===============================================================
filter:
  method: "keyword"                  # 严格走关键词匹配路径
  priority_sort_enabled: true

# ===============================================================
# 4.6 AI 智能筛选配置（当 filter.method=ai 时才生效，此处作为备用）
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis
  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: false               # 💡 重点：如果你还没有在下方 [ai] 填写有效的 API_KEY，请务必先保持这里为 false！否则程序会因鉴权失败卡死。

  standalone:
    platforms: ["zhihu", "wallstreetcn-hot"]
    rss_feeds: []
    max_items: 20

# ===============================================================
# 6. 推送通知（请确保在 Secrets 或下方填入了你的 Webhook，否则看不见推送）
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

# ===============================================================
# 8. AI 模型配置（共享）
# ===============================================================
ai:
  model: "deepseek/deepseek-chat"
  api_key: ""                        # 💡 如果有配置密钥，请填写到这里或者注入环境变量 AI_API_KEY
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: false                     # 💡 重点：如果没配 API_KEY，这里和上面的 display 保持一致先关掉
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true

# ===============================================================
# 10. AI 翻译功能
# ===============================================================
ai_translation:
  enabled: false                     # 💡 重点：同理，没配 API_KEY 之前先关掉，防止请求报错
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: true
    standalone: true

# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
